services:
  propresenter-remote:
    build: .
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    environment:
      # Single source of truth: PROPRESENTER_HOST from .env. When it's "localhost"
      # the app rewrites it to host.docker.internal inside the container (see
      # server/ppHost.ts). Set it to a LAN IP for PP on another machine.
      PROPRESENTER_HOST: ${PROPRESENTER_HOST:-localhost}
      PROPRESENTER_PORT: ${PROPRESENTER_PORT:-56650}
      PROPRESENTER_PROTOCOL: ${PROPRESENTER_PROTOCOL:-ws}
      PROPRESENTER_PASSWORD: ${PROPRESENTER_PASSWORD:-}
      ADMIN_PIN: ${ADMIN_PIN:-1234}
      APP_PORT: ${APP_PORT:-3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
